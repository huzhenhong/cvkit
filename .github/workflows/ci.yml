name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  cvkit-local:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Conan
        run: python -m pip install "conan>=2.0,<3.0"
      - name: Detect profile
        run: conan profile detect --force
      - name: Run local build/test smoke
        env:
          CVKIT_DIR: ${{ github.workspace }}
          BASEKIT_DIR: ${{ github.workspace }}/../basekit
          CONAN_BIN: conan
          CPPSTD: 17
          CVKIT_BUILD_EXAMPLES: ON
          CVKIT_BUILD_TESTS: ON
          CVKIT_BUILD_BENCHMARKS: OFF
        run: ./scripts/ci/cvkit_local.sh

  cvkit-package:
    runs-on: ubuntu-latest
    needs: cvkit-local
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Conan
        run: python -m pip install "conan>=2.0,<3.0"
      - name: Detect profile
        run: conan profile detect --force
      - name: Run package smoke
        env:
          CVKIT_DIR: ${{ github.workspace }}
          BASEKIT_DIR: ${{ github.workspace }}/../basekit
          CONAN_BIN: conan
          CPPSTD: 17
        run: ./scripts/ci/cvkit_package.sh
